services:
  relay:
    image: python:3.12-slim
    container_name: relay
    restart: unless-stopped
    # Game-agnostic pairing relay (reused by other minigames too).
    # Fetches relay.py from the yahtzee repo at start, so a container
    # restart picks up the latest relay code. No volumes, no state.
    command: >
      sh -c "pip install --no-cache-dir 'aiohttp>=3.9' >/dev/null &&
             python -c \"import urllib.request; urllib.request.urlretrieve('https://raw.githubusercontent.com/RaphaelA4U/yahtzee/main/relay/relay.py','/tmp/relay.py')\" &&
             python /tmp/relay.py"
    ports:
      - "5711:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3)"]
      interval: 60s
      timeout: 5s
      retries: 3
